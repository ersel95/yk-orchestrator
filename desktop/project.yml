# xcodegen project spec
# Üretim: cd desktop && xcodegen generate
# Build:   xcodebuild -project YKOrchestrator.xcodeproj -scheme YKOrchestrator -configuration Release

name: YKOrchestrator

options:
  bundleIdPrefix: com.yapikredi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    # Signing identity build-app.sh tarafından override edilir.
    # Lokal Xcode build için "Sign to Run Locally" yeterli.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  YKOrchestrator:
    type: application
    platform: macOS
    sources:
      - path: YKOrchestrator/Sources
    resources:
      - path: YKOrchestrator/Resources
        optional: true
        buildPhase: resources
    dependencies:
      - package: Sparkle
    info:
      path: YKOrchestrator/Info.plist
      properties:
        CFBundleName: YK Orchestrator
        CFBundleDisplayName: YK Orchestrator
        CFBundleIdentifier: com.yapikredi.ykorchestrator
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHighResolutionCapable: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Sparkle 2 anahtarları — release.sh CI çalışırken bu iki satırı
        # gerçek public key ve repo URL'siyle override eder.
        # Lokal dev build için placeholder yeterli (Sparkle imza doğrulayamaz, sadece yeni
        # sürüm bildirir).
        SUFeedURL: https://raw.githubusercontent.com/ersel95/yk-orchestrator/main/appcast.xml
        # SUEnableInstallerLauncherService SADECE sandboxed app'lerde lazım.
        # Bizim app sandbox'sız (Python sidecar için) — bu key'i true bırakırsak
        # Sparkle Installer XPC'sini login item olarak register etmeye çalışıyor,
        # macOS bunu reddediyor ve app relaunch fail oluyor.
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
        SUPublicEDKey: "REPLACE_WITH_BASE64_PUBLIC_KEY"
    entitlements:
      path: YKOrchestrator/YKOrchestrator.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_NAME: "YK Orchestrator"
        PRODUCT_BUNDLE_IDENTIFIER: com.yapikredi.ykorchestrator
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: YKOrchestrator/Info.plist
        CODE_SIGN_ENTITLEMENTS: YKOrchestrator/YKOrchestrator.entitlements
